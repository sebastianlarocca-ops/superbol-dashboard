name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Build backend (TypeScript)
        run: npm run build

      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build
